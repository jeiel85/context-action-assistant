name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android SDK path
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATES=()
          if command -v sdkmanager >/dev/null 2>&1; then
            SDKMANAGER_BIN="$(command -v sdkmanager)"
            INFERRED="$(echo "$SDKMANAGER_BIN" | sed -E 's#/cmdline-tools/.*/bin/sdkmanager$##')"
            CANDIDATES+=("$INFERRED")
          fi
          CANDIDATES+=(
            "${ANDROID_HOME:-}"
            "${ANDROID_SDK_ROOT:-}"
            "$HOME/android-sdk"
            "/usr/local/lib/android/sdk"
            "/opt/android-sdk"
          )

          SDK_ROOT=""
          for c in "${CANDIDATES[@]}"; do
            if [ -n "$c" ] && [ -d "$c" ]; then
              SDK_ROOT="$c"
              break
            fi
          done

          if [ -z "$SDK_ROOT" ]; then
            echo "Failed to find Android SDK root"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_ROOT" > local.properties

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses >/dev/null || true
          sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build Debug APK
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "context-action-assistant-${{ github.ref_name }}-debug.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "context-action-assistant-${{ github.ref_name }}-debug.apk"
          generate_release_notes: true

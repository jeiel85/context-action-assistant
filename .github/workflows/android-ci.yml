name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Configure local.properties
        run: |
          if [ -n "$ANDROID_HOME" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -n "$ANDROID_SDK_ROOT" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          elif command -v sdkmanager >/dev/null 2>&1; then
            SDKMANAGER_BIN="$(command -v sdkmanager)"
            SDK_ROOT="$(echo "$SDKMANAGER_BIN" | sed -E 's#/cmdline-tools/.*/bin/sdkmanager$##')"
            if [ -n "$SDK_ROOT" ] && [ -d "$SDK_ROOT" ]; then
              echo "sdk.dir=$SDK_ROOT" > local.properties
            else
              echo "Failed to infer Android SDK root from sdkmanager path: $SDKMANAGER_BIN"
              exit 1
            fi
          else
            echo "Android SDK path is missing"
            exit 1
          fi

      - name: Build Debug APK
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug --stacktrace --info 2>&1 | tee build.log

      - name: Run Unit Tests
        run: |
          set -o pipefail
          ./gradlew --no-daemon :app:testDebugUnitTest --stacktrace --info 2>&1 | tee test.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            build.log
            test.log

name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android SDK path
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATES=()

          if command -v sdkmanager >/dev/null 2>&1; then
            SDKMANAGER_BIN="$(command -v sdkmanager)"
            INFERRED="$(echo "$SDKMANAGER_BIN" | sed -E 's#/cmdline-tools/.*/bin/sdkmanager$##')"
            CANDIDATES+=("$INFERRED")
          fi
          CANDIDATES+=(
            "${ANDROID_HOME:-}"
            "${ANDROID_SDK_ROOT:-}"
            "$HOME/android-sdk"
            "/usr/local/lib/android/sdk"
            "/opt/android-sdk"
          )

          SDK_ROOT=""
          for c in "${CANDIDATES[@]}"; do
            if [ -n "$c" ] && [ -d "$c" ]; then
              SDK_ROOT="$c"
              break
            fi
          done

          if [ -z "$SDK_ROOT" ]; then
            echo "Failed to find Android SDK root"
            echo "ANDROID_HOME=${ANDROID_HOME:-<empty>}"
            echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<empty>}"
            command -v sdkmanager || true
            exit 1
          fi

          echo "Resolved Android SDK root: $SDK_ROOT"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_ROOT" > local.properties
          cat local.properties

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses >/dev/null || true
          sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          test -d "$ANDROID_HOME/platforms/android-35"
          test -d "$ANDROID_HOME/build-tools/35.0.0"

      - name: Build Debug APK
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug --stacktrace --info 2>&1 | tee build.log

      - name: Run Unit Tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --no-daemon :app:testDebugUnitTest --stacktrace --info 2>&1 | tee test.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            build.log
            test.log
